<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Netflix</title>

<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-900 text-gray-100 font-sans">

<div id="app" class="flex flex-col min-h-screen">

<header class="p-4 text-center border-b border-gray-800">
<h1 class="text-3xl font-bold text-red-600">Anime Netflix</h1>
</header>

<main id="content" class="flex-1 p-2 overflow-auto"></main>

</div>

<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center h-16 border-t border-gray-800 bg-gray-900">
<button onclick="showHome()" class="btn-nav" title="Главная">🏠</button>
<button onclick="showRandom()" class="btn-nav" title="Рандом">🎲</button>
<button onclick="showSearch()" class="btn-nav" title="Поиск">🔍</button>
<button onclick="showFavorites()" class="btn-nav" title="Избранное">❤️</button>
<button onclick="showTrash()" class="btn-nav" title="Треш">💩</button>
</nav>

<script src="api.js"></script>
<script src="favorites.js"></script>
<script src="ui.js"></script>
<script src="app.js"></script>
</body>
</html>
